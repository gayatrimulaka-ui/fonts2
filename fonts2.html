<!DOCTYPE html>
<html>
    <head>
        <title>Fonts2</title>
        <style>
        h1 {
        text-decoration: overline;
        text-transform: lowercase; }   

        h2 {
        text-decoration: line-through;
        text-transform: capitalize; }

        h3 {
        text-decoration: line-through;
        text-transform: capitalize; }

        h4 {
        text-decoration: underline;
        text-transform: uppercase; }
            
        </style>
    </head>
    <body>
        <h1>codingal</h1>
        <h2>cODINGAL</h2>
        <h3>Codingal</h3>
        <h4>CODINGAL</h4>
    </body>
</html>
